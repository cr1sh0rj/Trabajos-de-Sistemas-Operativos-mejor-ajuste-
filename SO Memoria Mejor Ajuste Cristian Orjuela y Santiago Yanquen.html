<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador Mejor Ajuste Dinámico</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    text-align:center;
}

h1{
    margin:20px;
}

.container{
    display:flex;
    justify-content:space-around;
    margin-top:20px;
}

.memory, .queue{
    width:300px;
    border:2px solid #333;
    padding:10px;
    background:white;
    min-height:400px;
}

.block{
    border:1px solid #999;
    margin:5px 0;
    position:relative;
    background:#ddd;
    transition:0.3s;
}
.memory-row{
    display:flex;
    align-items:center;
    gap:8px;
}

.delete-btn{
    background:#e53935;
}

.delete-btn:hover{
    background:#c62828;
}
.block.used{
    background:#4caf50;
    color:white;
}

.fragment{
    background:#ff5252;
    position:absolute;
    bottom:0;
    width:100%;
}

.process{
    background:#2196f3;
    color:white;
    padding:5px;
    margin:5px 0;
}

input{
    padding:5px;
    margin:5px;
}

button{
    padding:6px 12px;
    border:none;
    background:#333;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#555;
}
</style>
</head>

<body>

<h1>Simulación Mejor Ajuste</h1>

<div>
    <input type="text" id="pname" placeholder="Nombre proceso">
    <input type="number" id="psize" placeholder="Tamaño">
    <button onclick="addProcess()">Agregar Proceso</button>
</div>

<div class="container">

    <div>
        <h2>Memoria</h2>
        <div class="memory" id="memory"></div>
    </div>

    <div>
        <h2>Cola</h2>
        <div class="queue" id="queue"></div>
    </div>

</div>

<script>

let memoryBlocks = [
    {size:100, used:false, process:null},
    {size:500, used:false, process:null},
    {size:200, used:false, process:null},
    {size:300, used:false, process:null},
    {size:600, used:false, process:null}
];

let processes = [];

function render(){
    const memoryDiv = document.getElementById("memory");
    const queueDiv = document.getElementById("queue");

    memoryDiv.innerHTML="";
    queueDiv.innerHTML="";

    memoryBlocks.forEach((block,index)=>{

    const row = document.createElement("div"); 
    row.classList.add("memory-row"); 

    const div = document.createElement("div");
    div.classList.add("block");

        if(block.used){
            div.classList.add("used");

            let frag = block.size - block.process.size;

            div.innerHTML = `
                ${block.process.name} (${block.process.size})
                <br>Fragmentación: ${frag}
                
            `;

            if(frag > 0){
                const fragDiv = document.createElement("div");
                fragDiv.classList.add("fragment");
                fragDiv.style.height = (frag/block.size)*100 + "%";
                div.appendChild(fragDiv);
            }

        } else {
            div.innerHTML = "Libre: " + block.size;
        }

        div.style.height = block.size/3 + "px";
        row.appendChild(div);

	if(block.used){
    		const btn = document.createElement("button");
    		btn.innerText = "Eliminar";
   		btn.classList.add("delete-btn");
    		btn.onclick = () => removeProcess(index);

    		row.appendChild(btn);
	}

	memoryDiv.appendChild(row);
    });

    processes.forEach(p=>{
        const div = document.createElement("div");
        div.classList.add("process");
        div.innerHTML = p.name + " (" + p.size + ")";
        queueDiv.appendChild(div);
    });
}

function addProcess(){
    const name = document.getElementById("pname").value;
    const size = parseInt(document.getElementById("psize").value);

    if(!name || !size) return;

    processes.push({name, size});
    document.getElementById("pname").value="";
    document.getElementById("psize").value="";

    autoAllocate();
}

function autoAllocate(){
    processes = processes.filter(process => {

        let bestIndex = -1;
        let minDiff = Infinity;

        memoryBlocks.forEach((block,index)=>{
            if(!block.used && block.size >= process.size){
                let diff = block.size - process.size;
                if(diff < minDiff){
                    minDiff = diff;
                    bestIndex = index;
                }
            }
        });

        if(bestIndex !== -1){
            memoryBlocks[bestIndex].used = true;
            memoryBlocks[bestIndex].process = process;
            return false;
        }

        return true;
    });

    render();
}

function removeProcess(index){
    memoryBlocks[index].used = false;
    memoryBlocks[index].process = null;
    autoAllocate();
}

render();

</script>

</body>
</html>
