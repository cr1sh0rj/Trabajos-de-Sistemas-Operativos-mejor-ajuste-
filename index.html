<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador Mejor Ajuste Dinámico</title>
<link rel="stylesheet" href="./styles.css">
<script defer src="./main.js"></script>
</head>

<body>
    <h1>Simulación Mejor Ajuste</h1>

    <div>
        <input type="text" id="pname" placeholder="Nombre proceso">
        <input type="number" id="psize" placeholder="Tamaño">
        <button onclick="addProcess()">Agregar Proceso</button>
    </div>

    <div class="container">

        <div class="memory-container">
            <h2>Memoria</h2>
            <div id="memory">

            </div>
        </div>

        <div class="queue-container">
            <h2>Cola</h2>
            <div id="queue">

            </div>
        </div>

    </div>
</body>
</html>
