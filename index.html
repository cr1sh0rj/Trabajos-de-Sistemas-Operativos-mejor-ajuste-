<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador de Memoria</title>
<link rel="stylesheet" href="./styles.css">
<script defer src="./main.js"></script>
</head>

<body>
    <h1>Simulación de memoria primer y mejor ajuste</h1>
    <div class="options-panel">

    <h3>Algoritmo de Asignación</h3>

    <label>
        <input type="radio" name="algorithm" value="best" checked>
        Mejor Ajuste 
    </label>

    <label>
        <input type="radio" name="algorithm" value="first">
        Primer Ajuste 
    </label>

</div>

    <div class="input-container">
        <input type="text" id="process-name" placeholder="Nombre proceso">
        <input type="number" id="process-size" placeholder="Tamaño">
        <button id="add-process-btn" onclick="addProcess()">Agregar Proceso</button>
    </div>

    <div class="container">

        <div class="memory-container">
            <h2>Memoria</h2>
            <div id="memory">

            </div>
        </div>

        <div class="queue-container">
            <h2>Cola</h2>
            <div id="queue">

            </div>
        </div>

    </div>
</body>
</html>
